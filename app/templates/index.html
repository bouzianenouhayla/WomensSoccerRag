<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Women's Soccer RAG</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <main class="shell">
        <section class="hero">
            <h1>Women's Soccer Knowledge Lab</h1>
            <p>Ask about laws, tournaments, or stats. Answers stay local using a Retrieval-Augmented Generator.</p>
        </section>
        <section class="chat-panel">
            <div id="messages" class="messages"></div>
            <form id="chat-form" class="chat-form">
                <input id="question" name="question" placeholder="Ask something..." required minlength="3" />
                <button type="submit">Ask</button>
            </form>
        </section>
    </main>
    <script>
        const form = document.getElementById('chat-form');
        const input = document.getElementById('question');
        const messages = document.getElementById('messages');

        function appendMessage(role, text) {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${role}`;
            bubble.textContent = text;
            messages.appendChild(bubble);
            messages.scrollTop = messages.scrollHeight;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const question = input.value.trim();
            if (!question) return;
            appendMessage('user', question);
            input.value = '';
            appendMessage('assistant pending', 'Thinking...');
            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await response.json();
                messages.lastChild.remove();
                appendMessage('assistant', data.answer);
            } catch (error) {
                messages.lastChild.remove();
                appendMessage('assistant error', 'Something went wrong. Check the server logs.');
            }
        });
    </script>
</body>
</html>
